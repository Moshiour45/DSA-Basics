name: Trigger AlgoVerse Deploy

on:
  push:
    branches: [main]

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          echo "🚀 Triggering AlgoVerse rebuild on Vercel..."
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          echo "✅ Deploy hook triggered successfully!"
